name: Update Subscription

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          pip install requests pyyaml

      - name: Update V2Ray subscription
        run: |
          python merge_v2ray.py

      - name: Update Clash subscription
        run: |
          python merge_clash.py

      - name: Update Sing-box subscription
        run: |
          python merge_singbox.py

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || git commit -m "Auto Update All Subscriptions"

          git push
